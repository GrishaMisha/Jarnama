<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qazaq Ads - Доска объявлений</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/browser-image-compression@2.0.2/dist/browser-image-compression.js"></script>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
</head>
<body class="bg-gray-100 text-gray-800">
    <!-- Навигация -->
    <nav class="bg-white shadow-md p-4 sticky top-0 z-50">
    </nav>
 <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold text-blue-600" id="logo">Qazaq Ads</h1>
            <div class="flex items-center gap-4">
                <button onclick="toggleLang()" id="langBtn" class="bg-gray-200 px-3 py-1 rounded text-sm font-medium">KZ</button>
                <div id="authSection">
                    <button onclick="openAuthModal()" class="text-blue-600 font-semibold" data-i18n="login">Войти</button>
                </div>
                <button onclick="checkAuthAndOpenPost()" class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700" data-i18n="addAd">Подать объявление</button>
            </div>
        </div>
        <section class="container mx-auto mt-6 p-4">
  <h2 class="text-xl font-bold mb-4">Категории</h2>
  <div id="categories-container" class="flex flex-wrap gap-4">
    <p>Загрузка категорий...</p>
  </div>
</section>
    <!-- Фильтры -->
    <header class="container mx-auto mt-6 p-4 bg-white rounded-xl shadow-sm">
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
            <select id="filterRegion" class="border p-2 rounded w-full">
                <option value="" data-i18n="selectRegion">Область (Весь Казахстан)</option>
                <option value="Karaganda">Карагандинская область</option>
                <option value="Astana">г. Астана</option>
                <option value="Almaty">г. Алматы</option>
            </select>
            
            <select id="filterCategory" class="border p-2 rounded w-full">
                <option value="" data-i18n="allCats">Все категории</option>
                <option value="buy" data-i18n="catBuy">Куплю</option>
                <option value="free" data-i18n="catFree">Даром</option>
                <option value="services" data-i18n="catServices">Услуги</option>
            </select>

            <input type="number" id="minPrice" placeholder="Мин. цена" class="border p-2 rounded w-full">
            <input type="number" id="maxPrice" placeholder="Макс. цена" class="border p-2 rounded w-full">
        </div>
        <button onclick="applyFilters()" class="mt-4 w-full bg-blue-500 text-white py-2 rounded hover:bg-blue-600" data-i18n="search">Поиск</button>
    </header>

    <!-- Список объявлений -->
    <main class="container mx-auto mt-8 p-4">
        <div id="adsGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
            <!-- Сюда JS будет вставлять карточки -->
            <p class="text-center col-span-full py-10 text-gray-500">Загрузка объявлений...</p>
        </div>
    </main>

    <!-- Модалка регистрации (Упрощенно) -->
    <div id="authModal" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center p-4">
        <div class="bg-white p-6 rounded-xl max-w-sm w-full">
            <h2 class="text-xl font-bold mb-4" data-i18n="regTitle">Регистрация</h2>
            <input type="text" id="userName" placeholder="Ваше имя" class="border w-full p-2 mb-3 rounded">
            <input type="tel" id="userPhone" placeholder="+7 707 000 0000" class="border w-full p-2 mb-3 rounded">
            <div id="recaptcha-container"></div>
            <button onclick="sendCode()" class="w-full bg-green-500 text-white py-2 rounded mb-2">Отправить SMS</button>
            <input type="text" id="smsCode" placeholder="Код из SMS" class="border w-full p-2 mb-3 rounded hidden">
            <button onclick="closeAuthModal()" class="w-full text-gray-500 text-sm">Отмена</button>
        </div>
    </div>

    <script>
        // --- 1. ЛОКАЛИЗАЦИЯ ---
        let currentLang = 'ru';
        const i18n = {
            ru: {
                login: "Войти", addAd: "Подать объявление", search: "Поиск",
                selectRegion: "Выберите область", allCats: "Все категории",
                catBuy: "Куплю", catFree: "Даром", catServices: "Услуги",
                regTitle: "Вход / Регистрация"
            },
            kz: {
                login: "Кіру", addAd: "Хабарландыру беру", search: "Іздеу",
                selectRegion: "Облысты таңдаңыз", allCats: "Барлық санаттар",
                catBuy: "Сатып аламын", catFree: "Тегін беремін", catServices: "Қызметтер",
                regTitle: "Кіру / Тіркелу"
            }
        };

        function toggleLang() {
            currentLang = currentLang === 'ru' ? 'kz' : 'ru';
            document.getElementById('langBtn').innerText = currentLang === 'ru' ? 'KZ' : 'RU';
            updateUI();
        }

        function updateUI() {
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                el.innerText = i18n[currentLang][key];
            });
        }

        // --- 2. КОНФИГУРАЦИЯ FIREBASE ---
        const firebaseConfig = {
            apiKey: "ВАШ_API_KEY",
            authDomain: "ВАШ_PROJECT.firebaseapp.com",
            projectId: "ВАШ_PROJECT_ID",
            storageBucket: "ВАШ_PROJECT.appspot.com",
            messagingSenderId: "ID",
            appId: "APP_ID"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        // --- 3. ЛОГИКА ОБЪЯВЛЕНИЙ ---
        async function loadAds(filters = {}) {
            const grid = document.getElementById('adsGrid');
            grid.innerHTML = '<p class="text-center col-span-full">Загрузка...</p>';

            let query = db.collection('ads');

            if (filters.category) query = query.where('category', '==', filters.category);
            if (filters.region) query = query.where('region', '==', filters.region);

            const snapshot = await query.get();
            grid.innerHTML = '';

            snapshot.forEach(doc => {
                const ad = doc.data();
                // Простая фильтрация по цене на стороне клиента для экономии запросов
                if (filters.minPrice && ad.price < filters.minPrice) return;
                if (filters.maxPrice && ad.price > filters.maxPrice) return;

                grid.innerHTML += `
                    <div class="bg-white rounded-lg shadow-md overflow-hidden hover:shadow-lg transition">
                        <img src="${ad.image || 'https://via.placeholder.com/300'}" class="w-full h-48 object-cover">
                        <div class="p-4">
                            <h3 class="font-bold text-lg leading-tight h-12 overflow-hidden">${ad.title}</h3>
                            <p class="text-blue-600 font-bold mt-2">${ad.price} ₸</p>
                            <p class="text-sm text-gray-500 mt-1">${ad.region}, ${ad.city}</p>
                            <div class="mt-3 text-xs bg-gray-100 inline-block px-2 py-1 rounded">${ad.category}</div>
                        </div>
                    </div>
                `;
            });
        }

        function applyFilters() {
            const filters = {
                region: document.getElementById('filterRegion').value,
                category: document.getElementById('filterCategory').value,
                minPrice: Number(document.getElementById('minPrice').value),
                maxPrice: Number(document.getElementById('maxPrice').value)
            };
            loadAds(filters);
        }

        // --- 4. АУТЕНТИФИКАЦИЯ (ТЕЛЕФОН) ---
        function openAuthModal() {
            document.getElementById('authModal').classList.remove('hidden');
            window.recaptchaVerifier = new firebase.auth.RecaptchaVerifier('recaptcha-container');
        }

        function closeAuthModal() {
            document.getElementById('authModal').classList.add('hidden');
        }

        async function sendCode() {
            const phone = document.getElementById('userPhone').value;
            const appVerifier = window.recaptchaVerifier;
            
            try {
                window.confirmationResult = await auth.signInWithPhoneNumber(phone, appVerifier);
                document.getElementById('smsCode').classList.remove('hidden');
                alert("Код отправлен!");
            } catch (error) {
                alert("Ошибка: " + error.message);
            }
        }

        // Инициализация
        loadAds();
    </script>
<script type="module">

  // Your web app's Firebase configuration
  // For Firebase JS SDK v7.20.0 and later, measurementId is optional
  const firebaseConfig = {
    apiKey: "AIzaSyCcTxck1olJeJmCA1MSkwyO6pEQa1SvU8w",
    authDomain: "jarnama-31647.firebaseapp.com",
    projectId: "jarnama-31647",
    storageBucket: "jarnama-31647.firebasestorage.app",
    messagingSenderId: "449863022840",
    appId: "1:449863022840:web:25d34fae911889ceab630d",
    measurementId: "G-CT3HPQNBBZ"
  };

  // Initialize Firebase
  const app = initializeApp(firebaseConfig);
  const analytics = getAnalytics(app);
</script>
</body>
</html>
